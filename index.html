        body {

            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; 
            font-family: sans-serif;
        }

        /* Estilização da Tabela */
        table {
            width: 100%;
            max-width: 800px;
            border-collapse: collapse;
            font-size: 18px;
            margin-top: 20px;
        }

        th, td {
            border: 2px solid #333;
            padding: 10px;
            text-align: center;
        }

            background-color: #f2f2f2;
        }

        /* Ajustes para o Formulário dentro da Tabela */
        .form-table td {
            text-align: left; /* Alinha o texto das etiquetas à esquerda */
        }

        .form-table input, .form-table textarea {
            width: 100%;
            box-sizing: border-box; /* Garante que o padding não quebre a largura */
            padding: 8px;
            font-family: inherit;
        }

        .btn-container {
            text-align: center;
            margin-top: 15px;
            width: 100%;
            max-width: 800px;
        }

        .btn-enviar {
            font-size: 18px; /* Mesma fonte da tabela */

        }

        @media (max-width: 600px) {
            table, .btn-enviar {
                font-size: 14px;
            }
            
            .table-container {
                width: 100%;
                overflow-x: auto;
            }

            th, td {
