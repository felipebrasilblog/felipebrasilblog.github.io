<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog de Felipe Brasil Felicio</title>
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; 
            font-family: sans-serif;
        }

        /* Tabela Principal (Referência de tamanho: 800px) */
        .tabela-principal {
            width: 100%;
            max-width: 800px;
            border-collapse: collapse;
            font-size: 18px;
            margin-top: 20px;
        }

        th, td {
            border: 2px solid #333;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }

        /* --- TABELA LIVRO DE VISITAS (50% da principal = 400px) --- */
        .form-table {
            width: 400px; /* Metade dos 800px da principal */
            font-family: Arial, sans-serif;
            border-collapse: collapse;
        }

        .form-table th {
            font-weight: bold; /* Título em negrito */
            text-align: center;
        }

        .col-label {
            width: 100px; /* Reduzido para forçar a quebra do texto */
            text-align: left;
            font-size: 14px;
            line-height: 1.2;
            font-weight: normal;
        }

        /* Estilo dos campos de texto */
        .form-table input, .form-table textarea {
            width: 100%;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            resize: none;
            border: 1px solid #999;
        }

        /* Limitação de 2 linhas visualmente */
        .form-table input { height: 25px; }
        .form-table textarea { height: 45px; }

        .btn-enviar {
            font-size: 18px; /* Mesmo tamanho da tabela principal */
            padding: 5px 20px;
            cursor: pointer;
            font-family: Arial, sans-serif;
            margin-top: 10px;
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 600px) {
            .form-table {
                width: 90%; /* Em telas pequenas, ocupa quase tudo para não sumir */
            }
            .tabela-principal {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <form action="https://formspree.io/f/mvzbvobr" method="POST" style="display: flex; flex-direction: column; align-items: center;">
        <table class="form-table">
            <thead>
                <tr>
                    <th colspan="2">Livro de visitas</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="col-label">Seu nome aqui</td>
                    <td><input type="text" name="nome" required></td>
                </tr>
                <tr>
                    <td class="col-label">Deixe sua<br>mensagem aqui</td>
                    <td><textarea name="mensagem" required></textarea></td>
                </tr>
            </tbody>
        </table>
        
        <button type="submit" class="btn-enviar">ENVIAR</button>
    </form>

    <br><br>

    <div class="table-container" style="width: 100%; display: flex; justify-content: center;">
        <table class="tabela-principal">
            <thead>
                <tr>
                    <th colspan="4">Blog do Felipe Brasil Felicio</th>
                </tr>
            </thead>
            <tbody>

                    <td>#0004</td>

                    <td><a href="musicas.html">Músicas</a></td>

                </tr>

                    <td><a href="jogos.html">Jogos</a></td>
                    <td>19/02/2026</td>
                </tr>
                <tr>
                    <td>#0001</td>
                    <td><a href="0001.html">O início do Blog</a></td>
                    <td><a href="impressoes.html">Impressões</a></td>

</body>
</html>
