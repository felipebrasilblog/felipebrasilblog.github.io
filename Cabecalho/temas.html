<head>
    <meta charset="UTF-8">

    <title>Temas | Blog de Felipe Brasil Felicio</title>
    
    <style>
        /* Estilos Globais baseados no SITEFELIPE */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', sans-serif; 
        }
        
        body { 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; 
            background-color: #f2f5f3; /* Fundo esverdeado claro do SITEFELIPE */
            color: #1a1a1a; 
        }

        /* Container Principal (Estilo do Card do SITEFELIPE) */
        .container { 
            width: 100%;
            max-width: 740px; 
            background: #fff; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Alinhamento do Contador de Visitas */
        .contador-visitas {
            margin-bottom: 15px;
        }

        /* Título da Página (Estilo H1 do SITEFELIPE) */
        h1 { 
            font-size: 1.8rem; 
            margin-bottom: 30px; 
            color: #2d4a31; 
            text-align: center;
        }

        /* --- GRADE DE BOTÕES DE TEMAS --- */
        .grade-temas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            margin-top: 10px;
            margin-bottom: 35px; /* Espaço para o botão de retornar */
        }

        .btn-tema {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 12px 10px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.95rem;
            text-decoration: none;
            color: #fff;
            transition: all 0.25s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .btn-tema:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.12);
            text-decoration: none;
        }

        /* --- PALETA DE CORES SÓLIDAS VARIADAS --- */
        
        /* 1. Verde Original */
        .solido-verde { background-color: #7cb382; border: 1px solid #7cb382; }
        .solido-verde:hover { background-color: #629668; border-color: #629668; }
        
        /* 2. Azul */
        .solido-azul { background-color: #5c8ab3; border: 1px solid #5c8ab3; }
        .solido-azul:hover { background-color: #436d94; border-color: #436d94; }

        /* 3. Vermelho */
        .solido-vermelho { background-color: #cc6666; border: 1px solid #cc6666; }
        .solido-vermelho:hover { background-color: #b34d4d; border-color: #b34d4d; }

        /* 4. Laranja */
        .solido-laranja { background-color: #df8a57; border: 1px solid #df8a57; }
        .solido-laranja:hover { background-color: #c4703f; border-color: #c4703f; }

        /* 5. Roxo */
        .solido-roxo { background-color: #9b7cb3; border: 1px solid #9b7cb3; }
        .solido-roxo:hover { background-color: #806296; border-color: #806296; }

        /* 6. Ciano / Teal */
        .solido-ciano { background-color: #5ba3a3; border: 1px solid #5ba3a3; }
        .solido-ciano:hover { background-color: #3e8585; border-color: #3e8585; }

        /* 7. Rosa Escuro / Terracota Leve */
        .solido-rosa { background-color: #c97280; border: 1px solid #c97280; }
        .solido-rosa:hover { background-color: #ad5765; border-color: #ad5765; }

        /* 8. Castanho / Marrom */
        .solido-castanho { background-color: #b38461; border: 1px solid #b38461; }
        .solido-castanho:hover { background-color: #966947; border-color: #966947; }

        /* 9. Amarelo Escuro / Ouro Velho (para dar contraste com texto branco) */
        .solido-amarelo { background-color: #cca043; border: 1px solid #cca043; }
        .solido-amarelo:hover { background-color: #b0852a; border-color: #b0852a; }

        /* 10. Cinza Grafite */
        .solido-cinza { background-color: #6c757d; border: 1px solid #6c757d; }
        .solido-cinza:hover { background-color: #5a6268; border-color: #5a6268; }


        /* --- BOTÃO RETORNAR (Estilo SITEFELIPE) --- */
        .btn-retornar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 24px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.95rem;
            text-decoration: none;
            transition: 0.3s;
            background: transparent;
            border: 2px solid #7cb382;
            color: #7cb382;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-retornar:hover {
            background: #7cb382;
            color: #fff;
            text-decoration: none;
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 20px; border-radius: 12px; }
            h1 { font-size: 1.5rem; margin-bottom: 20px; }
            .grade-temas { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 25px; }
            .btn-tema { padding: 12px 8px; font-size: 0.9rem; border-radius: 10px; }
            .btn-retornar { padding: 8px 20px; font-size: 0.85rem; width: 100%; }
        }
    </style>
