<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arquivo | Blog de Felipe Brasil Felicio</title>
    
    <style>
        /* Estilos Globais baseados no SITEFELIPE */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', sans-serif; 
        }
        
        body { 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; 
            background-color: #f2f5f3; /* Fundo esverdeado claro do SITEFELIPE */
            color: #1a1a1a; 
        }

        /* Container Principal (Estilo do Card do SITEFELIPE) */
        .container { 
            width: 100%;
            max-width: 740px; 
            background: #fff; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Alinhamento do Contador de Visitas */
        .contador-visitas {
            margin-bottom: 15px;
        }

        /* Título do Blog (Estilo H1 do SITEFELIPE) */
        h1 { 
            font-size: 1.8rem; 
            margin-bottom: 20px; 
            color: #2d4a31; 
            text-align: center;
        }

        /* Tabela Principal de Entradas (Estilo do SITEFELIPE) */
        .tabela-principal {
            width: 100%;
            border-collapse: collapse;
            font-size: 1rem;
            margin: 15px 0 10px 0;
        }

        .tabela-principal th, .tabela-principal td {
            text-align: left;
            padding: 12px 10px;
            border-bottom: 1px solid #e8eee9;
            color: #444;
        }

        .tabela-principal th {
            color: #7cb382;
            font-weight: 600;
            background: transparent;
            border-bottom: 2px solid #7cb382;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* Estilo específico para a linha de aviso superior da tabela */
        .tabela-aviso {
            font-size: 0.95rem;
            color: #555;
            text-transform: none;
            letter-spacing: normal;
            font-weight: normal;
            border-bottom: 1px dashed #7cb382 !important;
            padding-bottom: 15px;
            text-align: center; /* Centraliza o texto e o link */
        }

        /* Ajuste de larguras das colunas da tabela incluindo 'Postagens' */
        .tabela-principal td:nth-child(1) { width: 12%; }
        .tabela-principal td:nth-child(2) { width: 22%; color: #666; }
        .tabela-principal td:nth-child(3) { width: 34%; }
        .tabela-principal td:nth-child(4) { width: 16%; text-align: right; color: #666; }
        .tabela-principal td:nth-child(5) { width: 16%; text-align: right; color: #666; }
        
        .tabela-principal th:nth-child(4), 
        .tabela-principal th:nth-child(5) { 
            text-align: right; 
        }

        /* Links Gerais */
        a { 
            color: #7cb382; 
            text-decoration: none; 
            font-weight: 500; 
        }
        a:hover { 
            text-decoration: underline; 
            color: #5e8c63; 
        }

        /* --- BOTÃO RETORNAR (Estilo SITEFELIPE) --- */
        .btn-retornar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 24px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.95rem;
            text-decoration: none;
            transition: 0.3s;
            background: transparent;
            border: 2px solid #7cb382;
            color: #7cb382;
            cursor: pointer;
            margin-top: 25px;
            margin-bottom: 10px;
        }

        .btn-retornar:hover {
            background: #7cb382;
            color: #fff;
            text-decoration: none;
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 20px; border-radius: 12px; }
            h1 { font-size: 1.5rem; }
            .tabela-principal { font-size: 0.85rem; }
            .tabela-principal th, .tabela-principal td { padding: 8px 4px; }
            .btn-retornar { padding: 8px 20px; font-size: 0.85rem; width: 100%; }
        }
    </style>
</head>
<body>

<div class="contador-visitas">
    <img src="https://hitscounter.dev/api/hit?url=felipebrasilblog.github.io&label=Visitantes&icon=broadcast&color=%23198754&message=&style=social&tz=Brazil%2FEast" alt="Contador de Visitas">
</div>

<div class="container">
    <h1>Arquivo</h1>

    <table class="tabela-principal">
        <thead>
            <tr>
                <th colspan="5" class="tabela-aviso">
                    Acesse todos os posts <a href="/arquivogeral.html">aqui</a>
                </th>
            </tr>
            <tr>
                <th>Página</th>
                <th>Postagens</th>
                <th>Texto</th>
                <th style="text-align: right;">Data de início</th>
                <th style="text-align: right;">Data de fim</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><a href="/Entradas/0001.html">1</a></td>
                <td>#0001-#0100</td>
                <td><a href="/Entradas/0001.html">O início do Blog</a></td>
                <td style="text-align: right;">Março 2026</td>
                <td style="text-align: right;">Julho 2026</td>
            </tr>
        </tbody>
    </table>

    <a href="/index.html" class="btn-retornar">Voltar para o Início</a>
</div>

</body>
</html>
