<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste 18</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body, html {
            min-height: 100vh; 
            margin: 0;
            display: flex;
            justify-content: center; 
            align-items: flex-start;     
            background-color: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.7;
        }

        .container {
            width: 90%;
            max-width: 750px;
            padding: 40px 50px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: left;
            margin: 40px auto;
        }

        h1, h3 {
            text-align: center;
        }

        h1 {
            color: #1a1a1a;
            margin-bottom: 10px;
            font-size: 2.5rem;
            line-height: 1.2;
        }

        h3 {
            font-weight: normal;
            color: #666;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
            font-size: 1.2rem;
        }

        /* CENTRALIZAÇÃO DO TÍTULO DA TABELA E DA TABELA */
        h2 {
            text-align: center; /* Centraliza o título da tabela */
            margin-top: 40px;
            color: #222;
        }

        table {
            margin: 20px auto; /* O 'auto' nas laterais centraliza a tabela no container */
            border-collapse: collapse;
            width: 100%;
            max-width: 500px; /* Largura sugerida para não esticar demais no desktop */
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f8f8f8;
        }

        p {
            margin-bottom: 20px;
            color: #333;
            font-size: 1.1rem;
        }

        ul {
            margin-bottom: 25px;
        }

        li {
            margin-bottom: 10px;
            color: #222;
        }

        li p {
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* Ajustes Responsivos para Mobile */
        @media (max-width: 600px) {
            .container {
                width: 95%;
                padding: 25px 20px;
                margin: 20px auto;
            }
            
            h1 {
                font-size: 1.8rem;
            }

            h3 {
                font-size: 1rem;
                padding-bottom: 15px;
            }

            p {
                font-size: 1rem;
            }

            table {
                width: 100%; /* No celular ela ocupa a largura total disponível */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Teste 18</h1>
        <h3>12/04/2026 Impressões</h3>
<p>
TESTE DA ENTRADA 18 NA PASTA DO GITHUB
</p>
    </div>
</body>
</html>
